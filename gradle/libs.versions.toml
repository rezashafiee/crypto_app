[versions]
agp = "8.13.0"
kotlin = "2.2.20"
ktlint = "13.1.0"
ksp = "2.2.20-2.0.3"
coreKtx = "1.17.0"
lifecycle = "2.9.4"
activityCompose = "1.11.0"
window = "1.5.0"
work = "2.10.5"
composeBom = "2025.09.01"
composeUiTextGoogleFonts = "1.9.2"
coroutines = "1.10.2"
room = "2.8.1"
koin = "4.1.1"
